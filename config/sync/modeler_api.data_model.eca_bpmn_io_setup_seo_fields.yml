          <camunda:field name="config_name">
            <camunda:string>core.entity_form_display.node.[content_type].default</camunda:string>
          </camunda:field>
          <camunda:field name="data">
            <camunda:string>module: field_group
  key: group_seo
  value:
    children:
      - field_seo_title
      - field_seo_description
      - field_seo_image
      - field_seo_analysis
    label: 'Search Engine Optimization (SEO) Information'
    region: content
    parent_name: ''
    weight: 50
    format_type: details
    format_settings:
      classes: ''
      show_empty_fields: false
      id: group_seo
      label_as_html: false
      open: false
      description: ''
      required_fields: false</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_1ru59vq</bpmn2:incoming>
        <bpmn2:outgoing>Flow_1ju7prb</bpmn2:outgoing>
      </bpmn2:task>
