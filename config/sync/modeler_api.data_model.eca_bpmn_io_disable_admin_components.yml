        <bpmndi:BPMNShape id="list_config_0kyy3xk_di" bpmnElement="list_config_0kyy3xk">
          <dc:Bounds x="175" y="170" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_list_remove_0ovk2qy_di" bpmnElement="eca_list_remove_0ovk2qy">
          <dc:Bounds x="475" y="170" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_config_action_1tn5vk1_di" bpmnElement="eca_config_action_1tn5vk1">
          <dc:Bounds x="925" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_switch_account_1qxw36r_di" bpmnElement="eca_switch_account_1qxw36r">
          <dc:Bounds x="775" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="Gateway_11751ek_di" bpmnElement="Gateway_11751ek" isMarkerVisible="true">
