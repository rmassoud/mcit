id: eca_bpmn_io_grant_media_type_permissions
data: |
  <?xml version="1.0" encoding="UTF-8"?>
  <bpmn2:definitions xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:bpmn2="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" xmlns:camunda="http://camunda.org/schema/1.0/bpmn" xmlns:qa="http://some-company/schema/bpmn/qa" id="sample-diagram" targetNamespace="http://bpmn.io/schema/bpmn" xsi:schemaLocation="http://www.omg.org/spec/BPMN/20100524/MODEL BPMN20.xsd">
    <bpmn2:process id="grant_media_type_permissions" name="Grant media type permissions" isExecutable="true" camunda:versionTag="1.0.0">
      <bpmn2:documentation>When a new media type is created, permissions to work with it are automatically granted to content editors.</bpmn2:documentation>
      <bpmn2:extensionElements>
        <camunda:properties>
          <camunda:property name="Tags" value="" />
          <camunda:property name="Changelog" value="" />
        </camunda:properties>
      </bpmn2:extensionElements>
      <bpmn2:startEvent id="config__save_1_1" name="Media type created" camunda:modelerTemplate="org.drupal.event.config:save">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="config:save" />
          </camunda:properties>
          <camunda:field name="config_name">
            <camunda:string>media.type.</camunda:string>
          </camunda:field>
          <camunda:field name="sync_mode">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="write_mode">
            <camunda:string>new</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:outgoing>Flow_15y5299</bpmn2:outgoing>
      </bpmn2:startEvent>
      <bpmn2:task id="eca_config_action_1p0ypjk" name="Grant permissions" camunda:modelerTemplate="org.drupal.action.eca_config_action">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_config_action" />
          </camunda:properties>
          <camunda:field name="action_id">
            <camunda:string>entity_method:user.role:grantPermissions</camunda:string>
          </camunda:field>
          <camunda:field name="config_name">
            <camunda:string>user.role.content_editor</camunda:string>
          </camunda:field>
          <camunda:field name="data">
            <camunda:string>["create [config:id] media", "delete any [config:id] media", "edit any [config:id] media", "use media [config:id] bulk upload form"]</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_1mr7jc6</bpmn2:incoming>
      </bpmn2:task>
      <bpmn2:task id="eca_switch_account_0dshb6m" name="Temporarily become administrator" camunda:modelerTemplate="org.drupal.action.eca_switch_account">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_switch_account" />
          </camunda:properties>
          <camunda:field name="user_id">
            <camunda:string>1</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_15y5299</bpmn2:incoming>
        <bpmn2:outgoing>Flow_1mr7jc6</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:sequenceFlow id="Flow_15y5299" sourceRef="config__save_1_1" targetRef="eca_switch_account_0dshb6m" />
      <bpmn2:sequenceFlow id="Flow_1mr7jc6" sourceRef="eca_switch_account_0dshb6m" targetRef="eca_config_action_1p0ypjk" />
    </bpmn2:process>
    <bpmndi:BPMNDiagram id="BPMNDiagram_grant_media_type_permissions">
      <bpmndi:BPMNPlane id="BPMNPlane_grant_media_type_permissions" bpmnElement="grant_media_type_permissions">
        <bpmndi:BPMNShape id="config__save_1_1_di" bpmnElement="config__save_1_1">
          <dc:Bounds x="57" y="52" width="36" height="36" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_config_action_1p0ypjk_di" bpmnElement="eca_config_action_1p0ypjk">
          <dc:Bounds x="325" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_switch_account_0dshb6m_di" bpmnElement="eca_switch_account_0dshb6m">
          <dc:Bounds x="175" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNEdge id="Flow_15y5299_di" bpmnElement="Flow_15y5299">
          <di:waypoint x="93" y="70" />
          <di:waypoint x="175" y="70" />
        </bpmndi:BPMNEdge>
        <bpmndi:BPMNEdge id="Flow_1mr7jc6_di" bpmnElement="Flow_1mr7jc6">
          <di:waypoint x="275" y="70" />
          <di:waypoint x="325" y="70" />
        </bpmndi:BPMNEdge>
      </bpmndi:BPMNPlane>
    </bpmndi:BPMNDiagram>
  </bpmn2:definitions>
