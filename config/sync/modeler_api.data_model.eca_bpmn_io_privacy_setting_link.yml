uuid: 443394b9-c8f7-4dfb-b4dc-a38e1114517f
langcode: en
status: true
dependencies: {  }
_core:
  default_config_hash: hzs-6ejbHpXDm0UFiswi7ouqglTJtuF-UCYX1YRmruY
id: eca_bpmn_io_privacy_setting_link
data: |
  <?xml version="1.0" encoding="UTF-8"?>
  <bpmn2:definitions xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:bpmn2="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" xmlns:camunda="http://camunda.org/schema/1.0/bpmn" xmlns:qa="http://some-company/schema/bpmn/qa" id="sample-diagram" targetNamespace="http://bpmn.io/schema/bpmn" xsi:schemaLocation="http://www.omg.org/spec/BPMN/20100524/MODEL BPMN20.xsd">
    <bpmn2:process id="privacy_setting_link" name="Show link to privacy settings" isExecutable="true" camunda:versionTag="">
      <bpmn2:documentation />
      <bpmn2:extensionElements>
        <camunda:properties>
          <camunda:property name="Tags" value="" />
          <camunda:property name="Changelog" value="" />
        </camunda:properties>
      </bpmn2:extensionElements>
      <bpmn2:startEvent id="config__save_config" name="Save config" camunda:modelerTemplate="org.drupal.event.config:save">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="config:save" />
          </camunda:properties>
          <camunda:field name="config_name">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="sync_mode">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="write_mode">
            <camunda:string></camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:outgoing>eca_scalar_app</bpmn2:outgoing>
      </bpmn2:startEvent>
      <bpmn2:task id="eca_void_and_condition_1" name="AND" camunda:modelerTemplate="org.drupal.action.eca_void_and_condition">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_void_and_condition" />
          </camunda:properties>
        </bpmn2:extensionElements>
        <bpmn2:incoming>eca_scalar_app</bpmn2:incoming>
        <bpmn2:outgoing>eca_scalar_enabled</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="eca_void_and_condition_2" name="AND" camunda:modelerTemplate="org.drupal.action.eca_void_and_condition">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_void_and_condition" />
          </camunda:properties>
        </bpmn2:extensionElements>
        <bpmn2:incoming>eca_scalar_enabled</bpmn2:incoming>
        <bpmn2:outgoing>eca_scalar_disabled</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="eca_switch_account_3" name="Switch to user 1" camunda:modelerTemplate="org.drupal.action.eca_switch_account">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_switch_account" />
          </camunda:properties>
          <camunda:field name="user_id">
            <camunda:string>1</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>eca_scalar_disabled</bpmn2:incoming>
        <bpmn2:outgoing>eca_scalar_required_1</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="eca_token_load_entity_link" name="Load menu link" camunda:modelerTemplate="org.drupal.action.eca_token_load_entity">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_token_load_entity" />
          </camunda:properties>
          <camunda:field name="token_name">
            <camunda:string>menulink</camunda:string>
          </camunda:field>
          <camunda:field name="from">
            <camunda:string>properties</camunda:string>
          </camunda:field>
          <camunda:field name="entity_type">
            <camunda:string>menu_link_content</camunda:string>
          </camunda:field>
          <camunda:field name="entity_id">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="revision_id">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="properties">
            <camunda:string>uuid: d7f4f1b2-af94-46b8-ac63-a8a5b14fb0f5</camunda:string>
          </camunda:field>
          <camunda:field name="langcode">
            <camunda:string>_interface</camunda:string>
          </camunda:field>
          <camunda:field name="latest_revision">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="unchanged">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="object">
            <camunda:string></camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>eca_scalar_required_1</bpmn2:incoming>
        <bpmn2:outgoing>eca_entity_field_value_disabled</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="eca_set_field_value_link_1" name="Enable menu link" camunda:modelerTemplate="org.drupal.action.eca_set_field_value">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_set_field_value" />
          </camunda:properties>
          <camunda:field name="field_name">
            <camunda:string>enabled</camunda:string>
          </camunda:field>
          <camunda:field name="field_value">
            <camunda:string>1</camunda:string>
          </camunda:field>
          <camunda:field name="method">
            <camunda:string>set:clear</camunda:string>
          </camunda:field>
          <camunda:field name="strip_tags">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="trim">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="save_entity">
            <camunda:string>yes</camunda:string>
          </camunda:field>
          <camunda:field name="object">
            <camunda:string>menulink</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>eca_entity_field_value_disabled</bpmn2:incoming>
      </bpmn2:task>
      <bpmn2:sequenceFlow id="eca_scalar_app" name="klaro app?" camunda:modelerTemplate="org.drupal.condition.eca_scalar" sourceRef="config__save_config" targetRef="eca_void_and_condition_1">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_scalar" />
          </camunda:properties>
          <camunda:field name="negate">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="left">
            <camunda:string>[config_name]</camunda:string>
          </camunda:field>
          <camunda:field name="right">
            <camunda:string>klaro.klaro_app.</camunda:string>
          </camunda:field>
          <camunda:field name="operator">
            <camunda:string>beginswith</camunda:string>
          </camunda:field>
          <camunda:field name="type">
            <camunda:string>value</camunda:string>
          </camunda:field>
          <camunda:field name="case">
            <camunda:string>no</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
      </bpmn2:sequenceFlow>
      <bpmn2:sequenceFlow id="eca_scalar_enabled" name="active?" camunda:modelerTemplate="org.drupal.condition.eca_scalar" sourceRef="eca_void_and_condition_1" targetRef="eca_void_and_condition_2">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_scalar" />
          </camunda:properties>
          <camunda:field name="negate">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="left">
            <camunda:string>[config:status]</camunda:string>
          </camunda:field>
          <camunda:field name="right">
            <camunda:string>1</camunda:string>
          </camunda:field>
          <camunda:field name="operator">
            <camunda:string>equal</camunda:string>
          </camunda:field>
          <camunda:field name="type">
            <camunda:string>value</camunda:string>
          </camunda:field>
          <camunda:field name="case">
            <camunda:string>no</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
      </bpmn2:sequenceFlow>
      <bpmn2:sequenceFlow id="eca_scalar_disabled" name="was inactive?" camunda:modelerTemplate="org.drupal.condition.eca_scalar" sourceRef="eca_void_and_condition_2" targetRef="eca_switch_account_3">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_scalar" />
          </camunda:properties>
          <camunda:field name="negate">
            <camunda:string>yes</camunda:string>
          </camunda:field>
          <camunda:field name="left">
            <camunda:string>[config_original:status]</camunda:string>
          </camunda:field>
          <camunda:field name="right">
            <camunda:string>1</camunda:string>
          </camunda:field>
          <camunda:field name="operator">
            <camunda:string>equal</camunda:string>
          </camunda:field>
          <camunda:field name="type">
            <camunda:string>value</camunda:string>
          </camunda:field>
          <camunda:field name="case">
            <camunda:string>no</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
      </bpmn2:sequenceFlow>
      <bpmn2:sequenceFlow id="eca_scalar_required_1" name="not required?" camunda:modelerTemplate="org.drupal.condition.eca_scalar" sourceRef="eca_switch_account_3" targetRef="eca_token_load_entity_link">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_scalar" />
          </camunda:properties>
          <camunda:field name="negate">
            <camunda:string>yes</camunda:string>
          </camunda:field>
          <camunda:field name="left">
            <camunda:string>[config:required]</camunda:string>
          </camunda:field>
          <camunda:field name="right">
            <camunda:string>1</camunda:string>
          </camunda:field>
          <camunda:field name="operator">
            <camunda:string>equal</camunda:string>
          </camunda:field>
          <camunda:field name="type">
            <camunda:string>value</camunda:string>
          </camunda:field>
          <camunda:field name="case">
            <camunda:string>no</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
      </bpmn2:sequenceFlow>
      <bpmn2:sequenceFlow id="eca_entity_field_value_disabled" name="menu disabled?" camunda:modelerTemplate="org.drupal.condition.eca_entity_field_value" sourceRef="eca_token_load_entity_link" targetRef="eca_set_field_value_link_1">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_entity_field_value" />
          </camunda:properties>
          <camunda:field name="negate">
            <camunda:string>yes</camunda:string>
          </camunda:field>
          <camunda:field name="expected_value">
            <camunda:string>1</camunda:string>
          </camunda:field>
          <camunda:field name="field_name">
            <camunda:string>enabled</camunda:string>
          </camunda:field>
          <camunda:field name="operator">
            <camunda:string>equal</camunda:string>
          </camunda:field>
          <camunda:field name="type">
            <camunda:string>value</camunda:string>
          </camunda:field>
          <camunda:field name="case">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="entity">
            <camunda:string>menulink</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
      </bpmn2:sequenceFlow>
    </bpmn2:process>
    <bpmndi:BPMNDiagram id="BPMNDiagram_privacy_setting_link">
      <bpmndi:BPMNPlane id="BPMNPlane_privacy_setting_link" bpmnElement="privacy_setting_link">
        <bpmndi:BPMNShape id="config__save_config_di" bpmnElement="config__save_config">
          <dc:Bounds x="57" y="52" width="36" height="36" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_void_and_condition_1_di" bpmnElement="eca_void_and_condition_1">
          <dc:Bounds x="175" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_void_and_condition_2_di" bpmnElement="eca_void_and_condition_2">
          <dc:Bounds x="325" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_switch_account_3_di" bpmnElement="eca_switch_account_3">
          <dc:Bounds x="475" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_token_load_entity_link_di" bpmnElement="eca_token_load_entity_link">
          <dc:Bounds x="625" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNShape id="eca_set_field_value_link_1_di" bpmnElement="eca_set_field_value_link_1">
          <dc:Bounds x="775" y="30" width="100" height="80" />
        </bpmndi:BPMNShape>
        <bpmndi:BPMNEdge id="eca_scalar_app_di" bpmnElement="eca_scalar_app">
          <di:waypoint x="93" y="70" />
          <di:waypoint x="175" y="70" />
        </bpmndi:BPMNEdge>
        <bpmndi:BPMNEdge id="eca_scalar_enabled_di" bpmnElement="eca_scalar_enabled">
          <di:waypoint x="275" y="70" />
          <di:waypoint x="325" y="70" />
        </bpmndi:BPMNEdge>
        <bpmndi:BPMNEdge id="eca_scalar_disabled_di" bpmnElement="eca_scalar_disabled">
          <di:waypoint x="425" y="70" />
          <di:waypoint x="475" y="70" />
        </bpmndi:BPMNEdge>
        <bpmndi:BPMNEdge id="eca_scalar_required_1_di" bpmnElement="eca_scalar_required_1">
          <di:waypoint x="575" y="70" />
          <di:waypoint x="625" y="70" />
        </bpmndi:BPMNEdge>
        <bpmndi:BPMNEdge id="eca_entity_field_value_disabled_di" bpmnElement="eca_entity_field_value_disabled">
          <di:waypoint x="725" y="70" />
          <di:waypoint x="775" y="70" />
        </bpmndi:BPMNEdge>
      </bpmndi:BPMNPlane>
    </bpmndi:BPMNDiagram>
  </bpmn2:definitions>
