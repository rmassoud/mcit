          <camunda:properties>
            <camunda:property name="pluginid" value="eca_clone_entity" />
          </camunda:properties>
          <camunda:field name="token_name">
            <camunda:string>temp</camunda:string>
          </camunda:field>
          <camunda:field name="label">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="published">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="owner">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="object">
            <camunda:string>entity</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_1cw8l3p</bpmn2:incoming>
        <bpmn2:incoming>Flow_14xanwe</bpmn2:incoming>
        <bpmn2:outgoing>eca_entity_is_accessible_link</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="eca_token_load_route_param_parmeter" name="Load route parameter" camunda:modelerTemplate="org.drupal.action.eca_token_load_route_param">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_token_load_route_param" />
          </camunda:properties>
          <camunda:field name="token_name">
            <camunda:string>entity</camunda:string>
          </camunda:field>
          <camunda:field name="request">
            <camunda:string>2</camunda:string>
          </camunda:field>
          <camunda:field name="parameter_name">
            <camunda:string>node</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_0a6ogpb</bpmn2:incoming>
        <bpmn2:outgoing>Flow_14xanwe</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="eca_token_load_query_arg_query" name="Load entity ID" camunda:modelerTemplate="org.drupal.action.eca_token_load_query_arg">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_token_load_query_arg" />
          </camunda:properties>
          <camunda:field name="token_name">
            <camunda:string>id</camunda:string>
          </camunda:field>
          <camunda:field name="argument_name">
            <camunda:string>duplicate</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_15qvdqc</bpmn2:incoming>
        <bpmn2:outgoing>Flow_0mjwsvc</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:sequenceFlow id="Flow_1cw8l3p" sourceRef="eca_render__entity_operations_link" targetRef="eca_clone_entity_link" />
      <bpmn2:sequenceFlow id="Flow_15qvdqc" sourceRef="content_entity__prepareform_entity" targetRef="eca_token_load_query_arg_query" />
      <bpmn2:sequenceFlow id="Flow_0a6ogpb" sourceRef="eca_render__local_tasks_tasks" targetRef="eca_token_load_route_param_parmeter" />
      <bpmn2:sequenceFlow id="Flow_14kshf8" sourceRef="eca_token_load_entity_entity" targetRef="action_message_action_message" />
      <bpmn2:sequenceFlow id="Flow_1vec5og" sourceRef="action_message_action_message" targetRef="eca_clone_entity_duplicate" />
      <bpmn2:sequenceFlow id="eca_entity_is_accessible_link" name="create access?" camunda:modelerTemplate="org.drupal.condition.eca_entity_is_accessible" sourceRef="eca_clone_entity_link" targetRef="eca_render_build_link">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_entity_is_accessible" />
          </camunda:properties>
          <camunda:field name="negate">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="operation">
            <camunda:string>create</camunda:string>
          </camunda:field>
          <camunda:field name="entity">
            <camunda:string>temp</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
      </bpmn2:sequenceFlow>
      <bpmn2:sequenceFlow id="Flow_14xanwe" sourceRef="eca_token_load_route_param_parmeter" targetRef="eca_clone_entity_link" />
      <bpmn2:sequenceFlow id="Flow_0mjwsvc" sourceRef="eca_token_load_query_arg_query" targetRef="eca_token_load_entity_entity" />
    </bpmn2:process>
    <bpmndi:BPMNDiagram id="BPMNDiagram_content_duplicate">
