data: |
  <?xml version="1.0" encoding="UTF-8"?>
  <bpmn2:definitions xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:bpmn2="http://www.omg.org/spec/BPMN/20100524/MODEL" xmlns:bpmndi="http://www.omg.org/spec/BPMN/20100524/DI" xmlns:dc="http://www.omg.org/spec/DD/20100524/DC" xmlns:di="http://www.omg.org/spec/DD/20100524/DI" xmlns:camunda="http://camunda.org/schema/1.0/bpmn" xmlns:qa="http://some-company/schema/bpmn/qa" id="sample-diagram" targetNamespace="http://bpmn.io/schema/bpmn" xsi:schemaLocation="http://www.omg.org/spec/BPMN/20100524/MODEL BPMN20.xsd">
    <bpmn2:process id="content_duplicate" name="Duplicate content" isExecutable="true" camunda:versionTag="">
      <bpmn2:documentation />
      <bpmn2:extensionElements>
        <camunda:properties>
          <camunda:property name="Tags" value="" />
          <camunda:property name="Changelog" value="" />
        </camunda:properties>
      </bpmn2:extensionElements>
      <bpmn2:startEvent id="eca_render__entity_operations_link" name="Operation links" camunda:modelerTemplate="org.drupal.event.eca_render:entity_operations">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_render:entity_operations" />
          </camunda:properties>
          <camunda:field name="entity_type_id">
            <camunda:string>node</camunda:string>
          </camunda:field>
          <camunda:field name="bundle">
            <camunda:string></camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:outgoing>Flow_1cw8l3p</bpmn2:outgoing>
      </bpmn2:startEvent>
      <bpmn2:startEvent id="content_entity__prepareform_entity" name="Prepare entity form" camunda:modelerTemplate="org.drupal.event.content_entity:prepareform">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="content_entity:prepareform" />
          </camunda:properties>
          <camunda:field name="type">
            <camunda:string>node _all</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:outgoing>Flow_15qvdqc</bpmn2:outgoing>
      </bpmn2:startEvent>
      <bpmn2:startEvent id="eca_render__local_tasks_tasks" name="Alter local task" camunda:modelerTemplate="org.drupal.event.eca_render:local_tasks">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_render:local_tasks" />
          </camunda:properties>
        </bpmn2:extensionElements>
        <bpmn2:outgoing>Flow_0a6ogpb</bpmn2:outgoing>
      </bpmn2:startEvent>
      <bpmn2:task id="eca_render_build_link" name="Link" camunda:modelerTemplate="org.drupal.action.eca_render_build">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_render_build" />
          </camunda:properties>
          <camunda:field name="name">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="token_name">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="weight">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="mode">
            <camunda:string>append</camunda:string>
          </camunda:field>
          <camunda:field name="value">
            <camunda:string>"#type": link
  "#url": /[entity:entity_type]/add/[entity:bundle_id]?duplicate=[entity:id]
  "#title": Duplicate</camunda:string>
          </camunda:field>
          <camunda:field name="use_yaml">
            <camunda:string>yes</camunda:string>
          </camunda:field>
          <camunda:field name="validate_yaml">
            <camunda:string>no</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>eca_entity_is_accessible_link</bpmn2:incoming>
      </bpmn2:task>
      <bpmn2:task id="eca_token_load_entity_entity" name="Load original entity" camunda:modelerTemplate="org.drupal.action.eca_token_load_entity">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_token_load_entity" />
          </camunda:properties>
          <camunda:field name="token_name">
            <camunda:string>original</camunda:string>
          </camunda:field>
          <camunda:field name="from">
            <camunda:string>id</camunda:string>
          </camunda:field>
          <camunda:field name="entity_type">
            <camunda:string>node</camunda:string>
          </camunda:field>
          <camunda:field name="entity_id">
            <camunda:string>[id]</camunda:string>
          </camunda:field>
          <camunda:field name="revision_id">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="properties">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="langcode">
            <camunda:string>_interface</camunda:string>
          </camunda:field>
          <camunda:field name="latest_revision">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="unchanged">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="object">
            <camunda:string>entity</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_0mjwsvc</bpmn2:incoming>
        <bpmn2:outgoing>Flow_14kshf8</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="action_message_action_message" name="Show duplicate message" camunda:modelerTemplate="org.drupal.action.action_message_action">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="action_message_action" />
          </camunda:properties>
          <camunda:field name="message">
            <camunda:string>You are duplicating "[original:label]"</camunda:string>
          </camunda:field>
          <camunda:field name="replace_tokens">
            <camunda:string>yes</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_14kshf8</bpmn2:incoming>
        <bpmn2:outgoing>Flow_1vec5og</bpmn2:outgoing>
      </bpmn2:task>
      <bpmn2:task id="eca_clone_entity_duplicate" name="Duplicate content" camunda:modelerTemplate="org.drupal.action.eca_clone_entity">
        <bpmn2:extensionElements>
          <camunda:properties>
            <camunda:property name="pluginid" value="eca_clone_entity" />
          </camunda:properties>
          <camunda:field name="token_name">
            <camunda:string>entity</camunda:string>
          </camunda:field>
          <camunda:field name="label">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="published">
            <camunda:string>no</camunda:string>
          </camunda:field>
          <camunda:field name="owner">
            <camunda:string></camunda:string>
          </camunda:field>
          <camunda:field name="object">
            <camunda:string>original</camunda:string>
          </camunda:field>
        </bpmn2:extensionElements>
        <bpmn2:incoming>Flow_1vec5og</bpmn2:incoming>
      </bpmn2:task>
      <bpmn2:task id="eca_clone_entity_link" name="Duplicate" camunda:modelerTemplate="org.drupal.action.eca_clone_entity">
